{% extends 'base/base.html' %}
{% block title %}Pay PMF{% endblock %}
{% block page_title %}PMF Payment{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header"><h6 class="mb-0 fw-semibold">Submit PMF Payment</h6></div>
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Amount (₹)</label>
          <input type="number" name="amount" class="form-control" step="0.01" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Transaction Number</label>
          <input type="text" name="transaction_no" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Payment Proof</label>
          <input type="file" name="payment_proof" class="form-control" accept=".jpg,.jpeg,.png,.pdf">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary"><i class="bi bi-cash me-2"></i>Submit Payment</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}

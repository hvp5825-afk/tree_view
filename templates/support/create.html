{% extends 'base/base.html' %}
{% block title %}New Ticket{% endblock %}
{% block page_title %}Create Support Ticket{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header"><h6 class="mb-0 fw-semibold">Submit a Ticket</h6></div>
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea name="message" class="form-control" rows="5" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Attachment (optional)</label>
            <input type="file" name="attachment" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary"><i class="bi bi-send me-2"></i>Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

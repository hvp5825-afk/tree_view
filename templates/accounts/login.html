<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – TreeView MLM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1e3a5f,#0d6efd); min-height:100vh; display:flex; align-items:center; }
    .login-card { border:none; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card login-card">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-diagram-3-fill text-primary fs-1"></i>
            <h4 class="fw-bold mt-2">TreeView MLM</h4>
            <p class="text-muted small">Sign in to your account</p>
          </div>
          {% if messages %}
          {% for msg in messages %}
          <div class="alert alert-danger py-2 small">{{ msg }}</div>
          {% endfor %}
          {% endif %}
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-medium">Member ID / Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter your ID" required autofocus>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-medium">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd(this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function togglePwd(btn) {
  const inp = btn.previousElementSibling;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.querySelector('i').className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}

// Force reload on browser back/forward to prevent stale state issues
window.addEventListener("pageshow", function (event) {
  var historyTraversal = event.persisted || 
                         (typeof window.performance != "undefined" && 
                          window.performance.navigation.type === 2);
  if (historyTraversal) {
    window.location.reload();
  }
});
</script>
</body>
</html>

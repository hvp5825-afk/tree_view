{% extends 'base/base.html' %}
{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header"><h6 class="mb-0 fw-semibold">Edit Product</h6></div>
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Title</label><input type="text" name="title" class="form-control" value="{{ product.title }}" required></div>
            <div class="col-md-3"><label class="form-label">Amount</label><input type="number" step="0.01" name="amount" class="form-control" value="{{ product.amount }}" required></div>
            <div class="col-md-3"><label class="form-label">Color</label><input type="text" name="color" class="form-control" value="{{ product.color }}"></div>
            <div class="col-md-4"><label class="form-label">Size</label><input type="text" name="size" class="form-control" value="{{ product.size }}"></div>
            <div class="col-md-4"><label class="form-label">Image</label><input type="file" name="image" class="form-control" accept="image/*"></div>
            <div class="col-md-4"><label class="form-label">Active</label><select name="is_active" class="form-select">{% with s=product.is_active %}<option value="1" {% if s %}selected{% endif %}>Yes</option><option value="0" {% if not s %}selected{% endif %}>No</option>{% endwith %}</select></div>
            <div class="col-12"><label class="form-label">Details</label><textarea name="details" id="id_details" class="form-control" rows="6">{{ product.details }}</textarea></div>
            <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Update Product</button></div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
<script>CKEDITOR.replace('id_details');</script>
{% endblock %}
